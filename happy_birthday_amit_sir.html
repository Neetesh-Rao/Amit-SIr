<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Nunito:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0015;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'Nunito', sans-serif;
  }

  /* STARS */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    border-radius: 50%;
    background: #fff;
    animation: twinkle var(--d) ease-in-out infinite alternate;
    opacity: 0;
  }
  @keyframes twinkle {
    0% { opacity: 0; transform: scale(0.6); }
    100% { opacity: 1; transform: scale(1.2); }
  }

  /* BALLOONS */
  .balloons {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
  }
  .balloon {
    position: absolute;
    bottom: -150px;
    width: 60px;
    height: 75px;
    border-radius: 50% 50% 50% 50% / 55% 55% 45% 45%;
    animation: floatUp var(--dur) ease-in infinite;
    animation-delay: var(--delay);
    opacity: 0.88;
  }
  .balloon::after {
    content: '';
    position: absolute;
    bottom: -20px;
    left: 50%;
    transform: translateX(-50%);
    width: 1px;
    height: 20px;
    background: rgba(255,255,255,0.4);
  }
  @keyframes floatUp {
    0% { transform: translateY(0) translateX(0) rotate(-4deg); opacity: 0.88; }
    25% { transform: translateY(-25vh) translateX(12px) rotate(4deg); }
    50% { transform: translateY(-50vh) translateX(-8px) rotate(-3deg); }
    75% { transform: translateY(-75vh) translateX(10px) rotate(5deg); }
    100% { transform: translateY(-110vh) translateX(0) rotate(-2deg); opacity: 0; }
  }

  /* CONFETTI */
  .confetti-container {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 2;
  }
  .confetti-piece {
    position: absolute;
    top: -10px;
    width: var(--w);
    height: var(--h);
    background: var(--color);
    border-radius: var(--br);
    animation: confettiFall var(--dur) linear infinite;
    animation-delay: var(--delay);
    opacity: 0;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(var(--rot)); opacity: 0.5; }
  }

  /* MAIN CARD */
  .card {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 50px 40px 40px;
    max-width: 520px;
    width: 90vw;
    animation: cardEntry 1.2s cubic-bezier(0.23, 1, 0.32, 1) forwards;
  }
  @keyframes cardEntry {
    from { opacity: 0; transform: scale(0.7) translateY(40px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* CAKE */
  .cake-wrap {
    margin: 0 auto 24px;
    width: 110px;
    height: 110px;
    position: relative;
    animation: cakeBounce 2.5s ease-in-out infinite;
  }
  @keyframes cakeBounce {
    0%, 100% { transform: translateY(0) rotate(-2deg); }
    50% { transform: translateY(-12px) rotate(2deg); }
  }
  .cake-emoji {
    font-size: 90px;
    line-height: 1;
    filter: drop-shadow(0 0 18px #ff6eb4) drop-shadow(0 0 40px #ffb347);
  }

  /* GLOWING RING */
  .glow-ring {
    position: absolute;
    inset: -10px;
    border-radius: 50%;
    border: 3px solid transparent;
    background: conic-gradient(from 0deg, #ff6eb4, #ffb347, #7fffd4, #ff6eb4) border-box;
    -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: destination-out;
    mask-composite: exclude;
    animation: spin 3s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* TEXT */
  .happy {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(42px, 10vw, 72px);
    background: linear-gradient(135deg, #ffb347 0%, #ff6eb4 50%, #7fffd4 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
    animation: shimmer 3s linear infinite;
    background-size: 200% auto;
    filter: drop-shadow(0 0 8px rgba(255,179,71,0.4));
  }
  @keyframes shimmer {
    0% { background-position: 0% center; }
    100% { background-position: 200% center; }
  }

  .birthday {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(36px, 9vw, 60px);
    background: linear-gradient(135deg, #7fffd4 0%, #ffb347 60%, #ff6eb4 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    background-size: 200% auto;
    animation: shimmer 3s linear infinite reverse;
    line-height: 1;
    filter: drop-shadow(0 0 8px rgba(127,255,212,0.3));
  }

  .name {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: clamp(28px, 7vw, 48px);
    color: #fff;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-top: 10px;
    text-shadow: 0 0 20px rgba(255,110,180,0.7), 0 0 50px rgba(255,179,71,0.4);
    animation: namePulse 2s ease-in-out infinite;
  }
  @keyframes namePulse {
    0%, 100% { text-shadow: 0 0 20px rgba(255,110,180,0.7), 0 0 50px rgba(255,179,71,0.4); letter-spacing: 4px; }
    50% { text-shadow: 0 0 35px rgba(255,110,180,1), 0 0 80px rgba(255,179,71,0.7); letter-spacing: 6px; }
  }

  .subtitle {
    margin-top: 6px;
    font-size: 15px;
    color: rgba(255,255,255,0.55);
    letter-spacing: 2px;
    font-weight: 700;
    text-transform: uppercase;
  }

  .divider {
    margin: 22px auto;
    display: flex;
    align-items: center;
    gap: 10px;
    justify-content: center;
  }
  .divider-line {
    height: 1px;
    width: 60px;
    background: linear-gradient(to right, transparent, rgba(255,179,71,0.6));
  }
  .divider-line.right { background: linear-gradient(to left, transparent, rgba(255,179,71,0.6)); }
  .divider-dot { color: #ffb347; font-size: 18px; animation: spin 4s linear infinite; display: inline-block; }

  .message {
    font-size: clamp(13px, 3.5vw, 16px);
    color: rgba(255,255,255,0.75);
    line-height: 1.8;
    font-weight: 400;
    animation: fadeInMsg 1.5s 0.8s ease both;
  }
  @keyframes fadeInMsg {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .wish-row {
    display: flex;
    justify-content: center;
    gap: 14px;
    margin-top: 26px;
    flex-wrap: wrap;
  }
  .wish-tag {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 100px;
    padding: 8px 20px;
    font-size: 13px;
    color: rgba(255,255,255,0.8);
    font-weight: 700;
    letter-spacing: 1px;
    animation: tagFloat var(--d) ease-in-out infinite alternate;
  }
  @keyframes tagFloat {
    from { transform: translateY(0); }
    to { transform: translateY(-6px); }
  }

  /* SPARKLES */
  .sparkle {
    position: absolute;
    pointer-events: none;
    font-size: var(--fs);
    animation: sparklePop var(--dur) ease-in-out infinite;
    animation-delay: var(--delay);
    opacity: 0;
  }
  @keyframes sparklePop {
    0% { opacity: 0; transform: scale(0) rotate(0deg); }
    50% { opacity: 1; transform: scale(1.2) rotate(180deg); }
    100% { opacity: 0; transform: scale(0) rotate(360deg); }
  }
</style>
</head>
<body>

<!-- Stars -->
<div class="stars" id="stars"></div>

<!-- Balloons -->
<div class="balloons" id="balloons"></div>

<!-- Confetti -->
<div class="confetti-container" id="confetti"></div>

<!-- Card -->
<div class="card">
  <!-- Sparkles around card -->
  <span class="sparkle" style="top:-20px;left:10%;--fs:22px;--dur:2.1s;--delay:0s">✨</span>
  <span class="sparkle" style="top:-10px;right:12%;--fs:18px;--dur:1.8s;--delay:0.5s">⭐</span>
  <span class="sparkle" style="bottom:20px;left:5%;--fs:20px;--dur:2.4s;--delay:1s">✨</span>
  <span class="sparkle" style="bottom:10px;right:6%;--fs:16px;--dur:1.9s;--delay:0.3s">🌟</span>
  <span class="sparkle" style="top:40%;left:-20px;--fs:14px;--dur:2.2s;--delay:0.7s">✦</span>
  <span class="sparkle" style="top:35%;right:-15px;--fs:16px;--dur:2s;--delay:1.2s">✦</span>

  <div class="cake-wrap">
    <div class="glow-ring"></div>
    <div class="cake-emoji">🎂</div>
  </div>

  <div class="happy">Happy</div>
  <div class="birthday">Birthday</div>
  <div class="name">Amit Sir</div>
  <div class="subtitle">Wishing you the best always</div>

  <div class="divider">
    <div class="divider-line"></div>
    <span class="divider-dot">✦</span>
    <div class="divider-line right"></div>
  </div>

  <div class="message">
    May this special day bring you endless joy,<br>
    laughter, and all the happiness you deserve.<br>
    Thank you for your guidance &amp; inspiration! 🙏
  </div>

  <div class="wish-row">
    <span class="wish-tag" style="--d:2.2s">🎉 Joy</span>
    <span class="wish-tag" style="--d:2.6s">❤️ Health</span>
    <span class="wish-tag" style="--d:2s">🌟 Success</span>
    <span class="wish-tag" style="--d:2.4s">🎊 Happiness</span>
  </div>
</div>

<script>
  // STARS
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 90; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 3 + 1;
    s.style.cssText = `
      left: ${Math.random()*100}%;
      top: ${Math.random()*100}%;
      width: ${size}px;
      height: ${size}px;
      --d: ${1.5 + Math.random()*3}s;
      animation-delay: ${Math.random()*4}s;
    `;
    starsEl.appendChild(s);
  }

  // BALLOONS
  const balloonColors = [
    'radial-gradient(circle at 35% 30%, #ff6eb4, #cc2277)',
    'radial-gradient(circle at 35% 30%, #ffb347, #cc7700)',
    'radial-gradient(circle at 35% 30%, #7fffd4, #00cc99)',
    'radial-gradient(circle at 35% 30%, #b39dff, #6633cc)',
    'radial-gradient(circle at 35% 30%, #ff6b6b, #cc2222)',
    'radial-gradient(circle at 35% 30%, #ffe066, #ccaa00)',
  ];
  const balloonsEl = document.getElementById('balloons');
  for (let i = 0; i < 14; i++) {
    const b = document.createElement('div');
    b.className = 'balloon';
    const color = balloonColors[i % balloonColors.length];
    b.style.cssText = `
      left: ${5 + (i * 7) % 90}%;
      background: ${color};
      --dur: ${7 + Math.random()*6}s;
      --delay: ${Math.random()*8}s;
      width: ${50 + Math.random()*30}px;
      height: ${65 + Math.random()*30}px;
    `;
    balloonsEl.appendChild(b);
  }

  // CONFETTI
  const confettiEl = document.getElementById('confetti');
  const confettiColors = ['#ff6eb4','#ffb347','#7fffd4','#b39dff','#ff6b6b','#ffe066','#fff','#00cfff'];
  for (let i = 0; i < 60; i++) {
    const c = document.createElement('div');
    c.className = 'confetti-piece';
    const isRect = Math.random() > 0.5;
    c.style.cssText = `
      left: ${Math.random()*100}%;
      --w: ${isRect ? (6+Math.random()*8)+'px' : (6+Math.random()*6)+'px'};
      --h: ${isRect ? (10+Math.random()*14)+'px' : (6+Math.random()*6)+'px'};
      --color: ${confettiColors[Math.floor(Math.random()*confettiColors.length)]};
      --br: ${isRect ? '2px' : '50%'};
      --dur: ${3 + Math.random()*5}s;
      --delay: ${Math.random()*6}s;
      --rot: ${Math.random()*720 - 360}deg;
    `;
    confettiEl.appendChild(c);
  }
</script>
</body>
</html>
